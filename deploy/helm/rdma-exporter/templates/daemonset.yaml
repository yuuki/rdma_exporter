apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "rdma-exporter.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rdma-exporter.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "rdma-exporter.selectorLabels" . | nindent 6 }}
  {{- with .Values.updateStrategy }}
  updateStrategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "rdma-exporter.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "rdma-exporter.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName }}
      {{- end }}
      hostNetwork: {{ .Values.hostNetwork }}
      hostPID: {{ .Values.hostPID }}
      containers:
      - name: rdma-exporter
        image: {{ include "rdma-exporter.image" . }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        {{- with .Values.securityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        args:
        - --listen-address={{ .Values.exporter.listenAddress }}
        - --metrics-path={{ .Values.exporter.metricsPath }}
        - --health-path={{ .Values.exporter.healthPath }}
        - --log-level={{ .Values.exporter.logLevel }}
        - --sysfs-root={{ .Values.exporter.sysfsRoot }}
        - --scrape-timeout={{ .Values.exporter.scrapeTimeout }}
        - --enable-roce-pfc-metrics={{ .Values.exporter.enableRoCEPFCMetrics }}
        {{- if .Values.exporter.excludeDevices }}
        - --exclude-devices={{ join "," .Values.exporter.excludeDevices }}
        {{- end }}
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        {{- with .Values.extraEnv }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        ports:
        - name: metrics
          containerPort: 9879
          protocol: TCP
        livenessProbe:
          httpGet:
            path: {{ .Values.exporter.healthPath }}
            port: metrics
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: {{ .Values.exporter.healthPath }}
            port: metrics
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        {{- with .Values.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        volumeMounts:
        - name: sys
          mountPath: /sys
          readOnly: true
        {{- with .Values.extraVolumeMounts }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      volumes:
      - name: sys
        hostPath:
          path: /sys
          type: Directory
      {{- with .Values.extraVolumes }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
